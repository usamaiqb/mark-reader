name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

# Cancel superseded PR runs, but let main runs finish (keeps default-branch
# history/badge complete and warm the shared Gradle cache).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Test, lint & build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lint

      # Builds the release variant (R8 + resource shrinking) WITHOUT signing —
      # no keystore secrets needed. Catches minification/ProGuard regressions on
      # every PR instead of only at tag-cut time.
      - name: Build release APK (unsigned, validates R8)
        run: ./gradlew assembleRelease
