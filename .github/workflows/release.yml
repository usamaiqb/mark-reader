name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-24.04

    steps:
      # fetch-depth: 0 so auto-generated release notes can find the previous tag
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Guard: the exact tagged commit is re-tested before we ship a signed APK.
      # Lint is skipped here — it's static and already covered on the PR.
      - name: Run unit tests
        run: ./gradlew test

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        run: mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/mark-reader-${{ github.ref_name }}.apk

      # Auto-generated notes: categorized PR list + "New Contributors" + compare
      # link. CHANGELOG.md is intentionally NOT used here (kept in-repo for
      # convention; the Release page is the auto-generated view).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/mark-reader-${{ github.ref_name }}.apk
