name: PR Conventions

# Validates that PR titles follow Conventional Commits.
# With squash-merge set to use the PR title, this keeps main's history clean.
# Uses pull_request (read-only) so it is safe for fork PRs.
on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]

permissions:
  contents: read

jobs:
  title:
    name: Conventional Commit title
    runs-on: ubuntu-24.04
    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9 ._-]+\))?!?: .+'
          if ! printf '%s' "$TITLE" | grep -qE "$pattern"; then
            echo "::error::PR title must follow Conventional Commits."
            echo "Examples: 'feat: add dark mode', 'fix(viewer): handle empty file', 'docs: update README'"
            echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
            exit 1
          fi
          echo "✅ Title follows Conventional Commits"
